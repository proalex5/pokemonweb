<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Entrenador - Peluking</title>
    <link rel="stylesheet" href="styles.css">
    <script type="module" src="login.js"></script>
</head>
<body class="flex-center">
    <div class="main-card login-box">
        <div class="logo" style="margin-bottom: 20px;">Peluking</div>
        <h2>ACCESO PRIVADO</h2>
        <p>Introduce tus credenciales de entrenador</p>
        
        <div class="input-group">
            <input type="text" id="user" placeholder="Usuario" autocomplete="off">
            <input type="password" id="pass" placeholder="Contraseña">
        </div>

        <button id="btn-entrar" class="btn-action" style="width: 100%;">CONECTAR</button>
        
        <p id="error" class="error-text hidden">¡Datos incorrectos!</p>
        
        <a href="index.html" class="link-back">← Volver al Ranking</a>
    </div>

</body>
</html>
