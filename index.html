<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Peluking - Torneos</title>
    <link rel="stylesheet" href="styles.css">
    <script type="module" src="index.js"></script>
</head>
<body>
    <nav class="user-nav">
        <div class="logo">Peluking</div>
        <div id="auth-section">
            <button id="btn-login" class="btn-nav" onclick="window.location.href='login.html'">Entrar</button>
            <div id="user-menu" class="hidden">
                <div class="profile-pill" id="profile-trigger">
                    <span id="display-name">Entrenador</span> <small>▼</small>
                </div>
                <div class="dropdown" id="dropdown">
                    <button onclick="window.location.href='panel.html'">Mi Panel</button>
                    <button id="logout-btn" class="danger">Cerrar Sesión</button>
                </div>
            </div>
        </div>
    </nav>

    <main id="main-view" class="container-main">
        <section class="glass-panel ranking-section">
            <h2>🏆 Ranking Total</h2>
            <div class="table-wrapper">
                <table class="table-modern">
                    <thead>
                        <tr>
                            <th>Entrenador</th>
                            <th>Torneos</th>
                            <th>Puntos</th>
                        </tr>
                    </thead>
                    <tbody id="ranking-body">
                        </tbody>
                </table>
            </div>
        </section>

        <section class="glass-panel torneos-section">
            <h2>🎮 Torneos Activos</h2>
            <div id="lista-torneos" class="torneos-grid">
                </div>
        </section>
    </main>

    <div id="detail-view" class="detail-container hidden">
        <button class="btn-back" id="back-btn">← Volver al inicio</button>
        <div id="dynamic-content"></div>
    </div>


</body>
</html>
