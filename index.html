<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Peluking - Torneos</title>
    <link rel="stylesheet" href="styles.css">
    <script type="module" src="index.js"></script>
</head>
<body>
    <nav class="user-nav">
        <div class="logo">Peluking</div>
        <div id="auth-section">
            <button id="btn-login" class="btn-nav" onclick="window.location.href='login.html'">Entrar</button>
            <div id="user-menu" class="hidden">
                <div class="profile-pill" id="profile-trigger">
                    <span id="display-name">Entrenador</span> <small>▼</small>
                </div>
                <div class="dropdown" id="dropdown">
                    <button onclick="window.location.href='panel.html'">Mi Panel</button>
                    <button id="logout-btn" class="danger">Cerrar Sesión</button>
                </div>
            </div>
        </div>
    </nav>

    <main id="main-view" class="container">
        <section class="main-card ranking-card">
            <div class="card-content">
                <h2>🏆 Ranking Total</h2>
                <p>Puntos acumulados históricos</p>
                <button class="btn-action" id="view-ranking-btn">Ver Ranking</button>
            </div>
        </section>

        <section class="main-card torneos-card">
            <div class="card-content">
                <h2>🎮 Torneos</h2>
                <p>Clasificaciones por edición</p>
                <button class="btn-action" id="view-torneos-btn">Ver Torneos</button>
            </div>
        </section>
    </main>

    <div id="detail-view" class="detail-container hidden">
        <button class="btn-back" id="back-btn">← Volver al inicio</button>
        <div id="dynamic-content"></div>
    </div>

</body>
</html>
